version: 2

builds:
  - dir: cli
    binary: denden
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - formats: [binary]
    name_template: "denden-{{ .Os }}-{{ .Arch }}{{ if eq .Os \"windows\" }}.exe{{ end }}"

release:
  github:
    owner: strawpot
    name: denden
